<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>免费种子监控 - 登录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1419;
  --panel: #171d24;
  --panel2: #1f2730;
  --line: #2d3742;
  --text: #e8edf2;
  --muted: #91a0ad;
  --accent: #2f9e6d;
  --accent2: #5ba7ff;
  --danger: #ff6b6b;
}
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: var(--bg);
  color: var(--text);
  font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
}
.login {
  width: min(420px, calc(100vw - 32px));
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 34px;
  box-shadow: 0 18px 55px rgba(0,0,0,.28);
}
.brand { margin-bottom: 26px; }
.brand h1 { font-size: 22px; font-weight: 700; letter-spacing: 0; }
.brand p { margin-top: 8px; color: var(--muted); font-size: 13px; }
.field { display: grid; gap: 7px; margin-bottom: 16px; }
label { color: var(--muted); font-size: 13px; }
input {
  width: 100%;
  height: 40px;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #0f1419;
  color: var(--text);
  padding: 0 12px;
  outline: none;
  font-size: 14px;
}
input:focus { border-color: var(--accent2); }
button {
  width: 100%;
  height: 42px;
  border: 0;
  border-radius: 6px;
  background: var(--accent);
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
button:disabled { opacity: .55; cursor: not-allowed; }
.error {
  min-height: 20px;
  margin-top: 12px;
  color: var(--danger);
  font-size: 13px;
}
.hint {
  margin-top: 18px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 12px;
}
</style>
</head>
<body>
<main class="login">
  <div class="brand">
    <h1>免费种子监控</h1>
    <p>登录后管理 RSS、qBittorrent 和抓取任务。</p>
  </div>
  <form id="loginForm">
    <div class="field">
      <label for="username">账号</label>
      <input id="username" autocomplete="username" value="admin">
    </div>
    <div class="field">
      <label for="password">密码</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="请输入密码">
    </div>
    <button id="loginBtn" type="submit">登录</button>
    <div class="error" id="error"></div>
  </form>
  <div class="hint">默认账号 admin，默认密码 admin123。登录后可在“设置”里修改。</div>
</main>

<script>
const form = document.getElementById('loginForm');
const username = document.getElementById('username');
const password = document.getElementById('password');
const button = document.getElementById('loginBtn');
const error = document.getElementById('error');

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  error.textContent = '';
  button.disabled = true;
  button.textContent = '登录中...';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: username.value.trim(),
        password: password.value,
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || '登录失败');
    location.href = '/';
  } catch (e) {
    error.textContent = e.message;
    password.value = '';
    password.focus();
  } finally {
    button.disabled = false;
    button.textContent = '登录';
  }
});

fetch('/api/me').then(res => {
  if (res.ok) location.href = '/';
}).catch(() => {});

password.focus();
</script>
</body>
</html>
